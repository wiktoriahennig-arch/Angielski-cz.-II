<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing English - 120 Questions Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover:not(:disabled) { transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="app" class="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="bg-indigo-600 p-6 text-white text-center">
        <h1 class="text-2xl font-bold uppercase tracking-wide">Medical English Mega Quiz</h1>
        <div class="mt-2 text-indigo-200 font-semibold" id="progress-text">Pytanie 1 / 120</div>
        <div class="w-full bg-indigo-800 h-3 mt-4 rounded-full overflow-hidden">
            <div id="progress-bar" class="bg-green-400 h-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <!-- Quiz Content -->
    <div id="quiz-container" class="p-8">
        <!-- Ekran startowy -->
        <div id="start-screen" class="text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Wielki Test (120 pytań)</h2>
            <p class="text-gray-600 mb-8 text-lg">Przed Tobą zestaw 120 pytań wielokrotnego wyboru. Na każdej stronie znajduje się jedno pytanie. Powodzenia!</p>
            <button onclick="startQuiz()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg transform hover:scale-105 transition">
                ROZPOCZNIJ QUIZ
            </button>
        </div>

        <!-- Ekran pytań -->
        <div id="question-screen" class="hidden">
            <div id="question-text" class="text-xl text-gray-800 font-bold mb-6 leading-relaxed">
                <!-- Pytanie pojawi się tutaj -->
            </div>
            <div id="options-container" class="space-y-3">
                <!-- Opcje pojawią się tutaj -->
            </div>
            <div id="feedback" class="mt-6 p-4 rounded-lg hidden"></div>
            <button id="next-btn" onclick="nextQuestion()" class="mt-8 w-full bg-gray-800 hover:bg-black text-white font-bold py-3 px-6 rounded-xl hidden transition">
                NASTĘPNE PYTANIE &rarr;
            </button>
        </div>

        <!-- Ekran końcowy -->
        <div id="end-screen" class="hidden text-center">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Quiz Zakończony!</h2>
            <p class="text-xl text-gray-600 mb-6">Udało Ci się przejść przez wszystkie 120 pytań.</p>
            <div class="bg-indigo-50 p-6 rounded-2xl mb-8 inline-block w-full">
                <div class="text-sm text-indigo-600 uppercase font-bold">Twój Wynik</div>
                <div id="final-score" class="text-5xl font-black text-indigo-800 mt-2">0/120</div>
            </div>
            <button onclick="location.reload()" class="mt-4 text-indigo-600 font-semibold hover:underline">Spróbuj ponownie</button>
        </div>
    </div>
</div>

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('question-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        answered = false;
        const qData = questionsData[currentIdx];
        
        document.getElementById('question-text').innerText = qData[0];
        document.getElementById('progress-text').innerText = `Pytanie ${currentIdx + 1} z ${questionsData.length}`;
        document.getElementById('progress-bar').style.width = `${((currentIdx) / questionsData.length) * 100}%`;

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData[1].forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 hover:border-indigo-400 hover:bg-indigo-50 font-medium text-gray-700 flex items-center justify-between";
            btn.innerHTML = `<span>${opt}</span><span class="icon hidden text-xl"></span>`;
            btn.onclick = () => checkAnswer(index, btn);
            container.appendChild(btn);
        });

        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
    }

    function checkAnswer(selectedIndex, btn) {
        if(answered) return;
        answered = true;

        const qData = questionsData[currentIdx];
        const correctIndex = qData[2];
        const allBtns = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');
        
        allBtns.forEach(b => b.disabled = true);

        if(selectedIndex === correctIndex) {
            score++;
            btn.classList.remove('border-gray-200');
            btn.classList.add('border-green-500', 'bg-green-100', 'text-green-800');
            btn.querySelector('.icon').innerHTML = '✅';
            btn.querySelector('.icon').classList.remove('hidden');
            feedback.innerText = "Poprawna odpowiedź!";
            feedback.className = "mt-6 p-4 rounded-lg bg-green-100 text-green-800 font-bold border border-green-200";
        } else {
            btn.classList.remove('border-gray-200');
            btn.classList.add('border-red-500', 'bg-red-100', 'text-red-800');
            btn.querySelector('.icon').innerHTML = '❌';
            btn.querySelector('.icon').classList.remove('hidden');
            
            // Podświetl prawidłową odpowiedź
            allBtns[correctIndex].classList.add('border-green-500', 'bg-green-100', 'text-green-800');
            
            feedback.innerText = `Niestety nie. Poprawna odpowiedź to: ${qData[1][correctIndex]}`;
            feedback.className = "mt-6 p-4 rounded-lg bg-red-100 text-red-800 font-bold border border-red-200";
        }
        
        feedback.classList.remove('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < questionsData.length) {
            showQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        document.getElementById('question-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${questionsData.length}`;
        document.getElementById('progress-bar').style.width = `100%`;
        document.getElementById('progress-text').innerText = `Quiz Zakończony!`;
    }
</script>

</body>
</html>
